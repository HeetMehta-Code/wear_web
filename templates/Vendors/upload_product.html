{% extends "Vendors/base.html" %}

{% block content %}
<style>
    /* 1. Wrapper and Card */
    .upload-box { 
        display: flex; 
        justify-content: center; 
        padding: 40px 20px; 
        background: #142c1e; 
        min-height: 80vh; 
    }
    .card { 
        background: #000; 
        border: 3px solid #78b388; 
        border-radius: 24px; 
        width: 100%; 
        max-width: 950px; 
        padding: 40px; 
        box-shadow: 0 0px 50px #cfffdc; 
    }
    
    /* 2. Scoped Typography */
    .card h2 { color: #cfffdc; margin-top: 0; font-size: 24px; letter-spacing: 1px; }
    .card h3 { color: #78b388; font-size: 16px; margin-bottom: 15px; }
    .card label { 
        display: block; 
        color: #cfffdc; 
        font-size: 15px; 
        font-weight: 800; 
        text-transform: uppercase; 
        margin-bottom: 8px; 
        margin-top: 15px; 
    }
    
    /* 3. SCOPED INPUTS - Uniform Sizing */
    .card input[type="text"], 
    .card input[type="number"], 
    .card input[type="file"],
    .card select, 
    .card textarea { 
        width: 100%; 
        background: #111; 
        border: 1px solid #222; 
        padding: 12px; 
        color: #fff; 
        border-radius: 12px; 
        transition: 0.3s; 
        box-sizing: border-box; 
        outline: none;
        font-family: inherit;
        font-size: 13px;
        height: 45px; 
    }

    .card input[type="file"] {
        padding: 8px 12px;
        cursor: pointer;
    }

    .card textarea { height: auto; }

    .card input:focus, 
    .card select:focus, 
    .card textarea:focus { 
        border-color: #78b388; 
        background: #161616; 
        box-shadow: 0 0 10px rgba(120, 179, 136, 0.1);
    }

    /* 4. Variant Section - 4 Equal Columns */
    .variant-row { 
        display: grid; 
        grid-template-columns: 1fr 1fr 1fr 1fr 45px; 
        gap: 12px; 
        background: #0a0a0a; 
        padding: 15px; 
        border-radius: 15px; 
        margin-bottom: 10px; 
        border: 1px solid #1a1a1a;
        align-items: center;
    }
    
    .add-variant-btn { 
        background: transparent; 
        color: #78b388; 
        border: 2px dashed #333; 
        padding: 12px; 
        width: 100%; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 700; 
        transition: 0.3s; 
        margin-bottom: 25px;
    }
    .add-variant-btn:hover { border-color: #78b388; background: #0a110c; color: #cfffdc; }
    
    .remove-btn { 
        background: #221111; 
        color: #ff5555; 
        border: 1px solid #442222; 
        border-radius: 10px; 
        cursor: pointer; 
        font-weight: 900;
        transition: 0.2s;
        height: 45px;
        width: 100%;
    }
    .remove-btn:hover { background: #441111; }

    /* Color block styles */
    .color-block {
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 16px;
    }
    .color-block-header {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 16px;
    }
    .color-header-fields {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 16px;
        flex: 1;
        align-items: end;
    }
    .size-rows-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 10px;
    }
    .size-row {
        display: grid;
        grid-template-columns: 1fr 1fr 45px;
        gap: 12px;
        align-items: center;
    }
    .add-size-btn {
        background: transparent;
        color: #78b388;
        border: 1px dashed #333;
        padding: 8px 16px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        transition: 0.2s;
        width: fit-content;
    }
    .add-size-btn:hover { border-color: #78b388; color: #cfffdc; }

    /* 6. Submit Button */
    .btn-publish { 
        width: 100%; 
        background: #cfffdc; 
        color: #000; 
        padding: 18px; 
        border: none; 
        border-radius: 15px; 
        font-weight: 900; 
        cursor: pointer; 
        font-size: 16px; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        margin-top: 20px;
        transition: 0.3s;
    }
    .btn-publish:hover { 
        background: #cfffdc; 
        transform: translateY(-2px); 
        box-shadow: 0 5px 20px rgba(207, 255, 220, 0.4); 
    }
</style>

<div class="upload-box">
    <div class="card">
        <h2>Upload New Product</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Product Name</label>
                    <input type="text" name="name" required placeholder="e.g. Premium Cotton T-Shirt">
                </div>
                <div>
                    <label>Brand Name</label>
                    <input type="text" name="brand" placeholder="e.g. Ramya Originals">
                </div>
            </div>

            <label>Description</label>
            <textarea name="description" rows="3" placeholder="Describe your product..."></textarea>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Category</label>
                    <select name="category" id="id_category" required onchange="updateSubCategories()">
                        <option value="mens">Men's Wear</option>
                        <option value="womens">Women's Wear</option>
                        <option value="kids">Kid's Wear</option>
                        <option value="bags">Bags</option>
                        <option value="footwear">Footwear</option>
                        <option value="makeup">Makeup</option>
                        <option value="sunglasses">Sunglasses</option>
                        <option value="belts">Belts</option>
                        <option value="purses">Purses</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label>Sub-Category</label>
                    <select name="sub_category" id="id_sub_category">
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Selling Price (₹)</label>
                    <input type="number" step="0.01" name="price" required placeholder="0.00">
                </div>
                <div>
                    <label>Original Price (₹)</label>
                    <input type="number" step="0.01" name="original_price" placeholder="For discount display">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #222; margin: 30px 0;">

            <h3 style="color: #78b388;">Product Variants</h3>
            <p style="color: #666; font-size: 12px; margin-bottom: 20px;">
                Add one colour at a time — upload <strong style="color:#cfffdc;">one image per colour</strong>. 
                Then add all sizes for that colour below it. The first colour's image becomes the main product photo.
            </p>

            <div id="color-container"></div>

            <button type="button" class="add-variant-btn" onclick="addColorBlock()">+ Add Colour</button>

            <button type="submit" class="btn-publish">Publish Product</button>
        </form>
    </div>
</div>

<script>
    // ── Subcategory data ──
    const subData = {
        'mens':   ['Jacket', 'T-Shirt', 'Shirt', 'Hoodie', 'Pants', 'Traditional'],
        'womens': ['Saree', 'Kurti', 'Pant', 'T-Shirt', 'Western', 'Sweatshirt'],
        'kids':   ['Boys', 'Girls']
    };

    function updateSubCategories() {
        const cat = document.getElementById('id_category').value;
        const subSelect = document.getElementById('id_sub_category');
        subSelect.innerHTML = '';
        const options = subData[cat] || ['Other'];
        options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt.toLowerCase();
            el.textContent = opt;
            subSelect.appendChild(el);
        });
    }

    // ── Add a colour block (one image per colour, multiple sizes under it) ──
    function addColorBlock() {
        const container = document.getElementById('color-container');
        const colorId = Date.now();
        const block = document.createElement('div');
        block.className = 'color-block';
        block.id = 'color-' + colorId;
        block.innerHTML = `
            <div class="color-block-header">
                <div class="color-header-fields">
                    <div>
                        <label style="color:#cfffdc;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Colour Name</label>
                        <input type="text" name="variant_color[]" placeholder="e.g. Red, Navy Blue" class="color-name-input" oninput="updateColorPreview(this)" required>
                    </div>
                    <div>
                        <label style="color:#cfffdc;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Colour Image</label>
                        <input type="file" name="variant_image[]" accept="image/*" onchange="previewColorImg(this)" required>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;margin-top:20px;">
                        <div class="color-preview-dot" id="dot-${colorId}" style="width:32px;height:32px;border-radius:50%;border:2px solid #333;background:#333;flex-shrink:0;"></div>
                        <img id="imgPreview-${colorId}" src="" style="display:none;width:50px;height:50px;object-fit:cover;border-radius:8px;border:2px solid #78b388;">
                    </div>
                </div>
                <button type="button" class="remove-btn" style="width:45px;height:45px;margin-top:20px;flex-shrink:0;" onclick="document.getElementById('color-${colorId}').remove()">×</button>
            </div>

            <div class="size-rows-container" id="sizes-${colorId}">
                <div class="size-row">
                    <input type="text" name="variant_size[]" placeholder="Size (e.g. S, M, XL, 42)">
                    <input type="number" name="variant_qty[]" placeholder="Stock qty" min="0" required>
                    <button type="button" class="remove-btn" style="width:45px;height:45px;" onclick="this.parentElement.remove()">×</button>
                </div>
            </div>

            <button type="button" class="add-size-btn" onclick="addSizeRow('sizes-${colorId}', '${colorId}')">+ Add Size</button>
        `;
        container.appendChild(block);
    }

    function addSizeRow(containerId, colorId) {
        const container = document.getElementById(containerId);
        // Get the color name from this block
        const block = document.getElementById('color-' + colorId);
        const colorName = block.querySelector('.color-name-input').value;
        const row = document.createElement('div');
        row.className = 'size-row';
        row.innerHTML = `
            <input type="text" name="variant_size[]" placeholder="Size (e.g. S, M, XL, 42)">
            <input type="number" name="variant_qty[]" placeholder="Stock qty" min="0" required>
            <button type="button" class="remove-btn" style="width:45px;height:45px;" onclick="this.parentElement.remove()">×</button>
        `;
        container.appendChild(row);
    }

    function updateColorPreview(input) {
        const block = input.closest('.color-block');
        const colorId = block.id.replace('color-', '');
        const dot = document.getElementById('dot-' + colorId);
        if (dot) {
            dot.style.backgroundColor = input.value.toLowerCase() || '#333';
        }
    }

    function previewColorImg(input) {
        const block = input.closest('.color-block');
        const colorId = block.id.replace('color-', '');
        const preview = document.getElementById('imgPreview-' + colorId);
        if (input.files && input.files[0] && preview) {
            const reader = new FileReader();
            reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Add first color block on load
    addColorBlock();
    updateSubCategories();
</script>
{% endblock %}
